<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Réveil des Ducs — Suivi Spectateur</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #111822;
      --surface2: #182030;
      --border: #1e2d42;
      --accent: #f5a623;
      --accent2: #00d4aa;
      --danger: #ff5f5f;
      --text: #dce8f5;
      --muted: #5a7a9a;
      --seen: #1a3a28;
      --seen-border: #00d4aa;
      --warn-bg: #1e1a0e;
      --warn-border: #f5a623;
      --next-bg: #0f2820;
      --next-border: #00d4aa;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-icon { font-size: 1.4rem; }
    .header-text { flex: 1; }
    .header-title {
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.01em;
      line-height: 1;
    }
    .header-sub {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
    }
    .pace-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.7rem;
      color: var(--accent2);
      font-family: var(--mono);
      white-space: nowrap;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      font-family: var(--mono);
      font-size: 0.78rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* TAB CONTENTS */
    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* INFO BAR */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px;
      font-size: 0.68rem;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .info-bar b { color: var(--text); }

    /* RECALIB BANNER */
    .recalib-banner {
      display: none;
      margin: 8px 12px;
      padding: 8px 12px;
      background: var(--seen);
      border: 1px solid var(--seen-border);
      border-radius: 8px;
      font-size: 0.72rem;
      color: var(--accent2);
      flex-shrink: 0;
    }
    .recalib-banner.show { display: block; }

    /* POINTS LIST */
    #points-list { flex: 1; overflow-y: auto; }

    .point-item {
      display: flex;
      align-items: center;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      position: relative;
      transition: background 0.15s;
    }
    .point-item.is-seen {
      background: transparent;
      opacity: 0.45;
    }
    .point-item.is-next {
      background: var(--next-bg);
      border-left: 3px solid var(--next-border);
    }
    .point-item.is-close {
      background: var(--warn-bg);
      border-left: 3px solid var(--warn-border);
    }

    .km-badge {
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--accent);
      min-width: 46px;
      line-height: 1;
    }
    .km-badge small {
      display: block;
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 1px;
    }

    .point-center { flex: 1; }
    .point-time {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .point-gap {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .point-actual {
      font-size: 0.65rem;
      color: var(--accent2);
      margin-top: 2px;
    }
    .badge-court {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.58rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 10px;
      font-family: var(--display);
      vertical-align: middle;
      margin-left: 4px;
    }

    /* VU BUTTON */
    .btn-vu {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .btn-vu:active { background: var(--border); }
    .btn-vu.done {
      background: var(--seen);
      border-color: var(--seen-border);
      color: var(--accent2);
    }

    /* LEGEND */
    .list-legend {
      flex-shrink: 0;
      padding: 7px 14px;
      font-size: 0.63rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .legend-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* MAP */
    #map { width: 100%; flex: 1; }

    /* MAP TOOLBAR */
    .map-toolbar {
      display: flex;
      gap: 6px;
      padding: 6px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .map-tool-btn {
      flex: 1 1 0;
      min-width: 0;
      padding: 7px 6px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.66rem;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .map-tool-btn:active { background: var(--border); }
    .map-tool-btn.danger { color: var(--danger); border-color: #3a1f28; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--accent2);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.75rem;
      font-family: var(--mono);
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      max-width: 86vw;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* POPUP MARKER */
    .point-popup { font-family: var(--mono); color: #1a1a1a; min-width: 170px; }
    .point-popup .pp-title { font-weight: 600; font-size: 0.82rem; margin-bottom: 3px; }
    .point-popup .pp-coords { font-size: 0.65rem; color: #666; margin-bottom: 8px; }
    .point-popup .pp-actions { display: flex; flex-direction: column; gap: 4px; }
    .point-popup .pp-btn {
      display: block;
      padding: 7px 9px;
      border-radius: 5px;
      font-size: 0.72rem;
      text-decoration: none;
      font-weight: 500;
      text-align: center;
    }
    .point-popup .pp-sv  { background: #1a73e8; color: #fff; }
    .point-popup .pp-sat { background: #5f6368; color: #fff; }
    .point-popup .pp-gm  { background: #34a853; color: #fff; }
    .point-popup .pp-hint { margin-top: 6px; font-size: 0.6rem; color: #888; text-align: center; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 480px;
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .modal-km {
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .modal-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .modal-time-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--display);
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      padding: 14px;
      margin-bottom: 16px;
      -webkit-appearance: none;
    }
    .modal-time-input:focus { outline: none; border-color: var(--accent2); }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 13px;
      border-radius: 12px;
      border: none;
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-confirm { background: var(--accent); color: var(--bg); }
    .btn-cancel { background: var(--surface2); color: var(--muted); }

    /* ARRIVEE SPECIAL */
    .finish-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      background: linear-gradient(90deg, rgba(245,166,35,0.08), transparent);
      border-top: 1px solid var(--accent);
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .finish-row .km-badge { color: var(--accent2); }
    .finish-row .point-time { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🏃</div>
  <div class="header-text">
    <div class="header-title">RÉVEIL DES DUCS — SUIVI</div>
    <div class="header-sub">27 juin 2026 · Départ 23h00 · Suscinio → Vannes</div>
  </div>
  <div class="pace-chip" id="pace-chip">9'26"/km</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('list')">📋 Passages</button>
  <button class="tab" onclick="showTab('map')">🗺️ Carte</button>
</div>

<!-- TAB LISTE -->
<div id="tab-list" class="tab-content active">
  <div class="info-bar">
    <div>Objectif <b>70 km en 11h</b> · Arrivée <b id="est-arrival">~10h00</b></div>
    <div id="next-label" style="color:var(--accent2)"></div>
  </div>
  <div class="recalib-banner" id="recalib-banner"></div>
  <div id="points-list"></div>
  <div class="list-legend">
    <span><span class="legend-dot" style="background:var(--next-border)"></span>Prochain spot</span>
    <span><span class="legend-dot" style="background:var(--accent)"></span>&lt; 10 min avec précédent</span>
    <span><span class="legend-dot" style="background:var(--muted)"></span>Passé</span>
  </div>
</div>

<!-- TAB CARTE -->
<div id="tab-map" class="tab-content">
  <div class="map-toolbar">
    <button type="button" class="map-tool-btn" onclick="copyPositionsLink()">🔗 Copier lien</button>
    <button type="button" class="map-tool-btn" onclick="copyPointsSource()">📋 Export POINTS</button>
    <button type="button" class="map-tool-btn danger" onclick="resetPointPositions()">↺ Reset</button>
  </div>
  <div id="map"></div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-km" id="modal-km-label">km —</div>
    <div class="modal-label">Heure de passage réelle :</div>
    <input type="time" class="modal-time-input" id="modal-time"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmVu()">✓ Confirmer</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── CONFIG ─────────────────────────────────────────────
const DEPART_SEC = 23 * 3600;       // 23h00 en secondes

// Points de repérage spectateur.
// Les positions (lat/lng) sont les spots où l'observateur se placera.
// Les km correspondent au kilométrage EXACT sur la trace GPX au point le
// plus proche de ce spot — utilisés pour estimer précisément les écarts
// de temps entre points lors du suivi en direct.
// Flags : start/finish pour le départ et l'arrivée.
const POINTS = [
  { km: 0,      lat: 47.512810, lng: -2.729100, label: 'Départ — Château de Suscinio', start: true },
  { km: 6.486,  lat: 47.505751, lng: -2.762804 },
  { km: 7.458,  lat: 47.504852, lng: -2.772589 },
  { km: 10.129, lat: 47.516679, lng: -2.766924 },
  { km: 12.486, lat: 47.525041, lng: -2.754138 },
  { km: 13.909, lat: 47.527692, lng: -2.755852 },
  { km: 15.922, lat: 47.540933, lng: -2.746453 },
  { km: 18.583, lat: 47.547552, lng: -2.728193 },
  { km: 20.865, lat: 47.556039, lng: -2.720275 },
  { km: 22.651, lat: 47.567000, lng: -2.726734 },
  { km: 24.028, lat: 47.574166, lng: -2.716649 },
  { km: 26.464, lat: 47.582127, lng: -2.704933 },
  { km: 27.271, lat: 47.585644, lng: -2.704804 },
  { km: 28.871, lat: 47.585934, lng: -2.696908 },
  { km: 31.319, lat: 47.593286, lng: -2.686801 },
  { km: 32.600, lat: 47.597959, lng: -2.681565 },
  { km: 34.460, lat: 47.603964, lng: -2.672832 },
  { km: 36.069, lat: 47.614510, lng: -2.683733 },
  { km: 37.414, lat: 47.625488, lng: -2.681651 },
  { km: 38.944, lat: 47.635149, lng: -2.682230 },
  { km: 41.265, lat: 47.642998, lng: -2.704847 },
  { km: 42.937, lat: 47.647537, lng: -2.719266 },
  { km: 45.074, lat: 47.636781, lng: -2.716906 },
  { km: 45.655, lat: 47.632198, lng: -2.718129 },
  { km: 46.450, lat: 47.627165, lng: -2.716734 },
  { km: 48.907, lat: 47.614221, lng: -2.730703 },
  { km: 51.477, lat: 47.600940, lng: -2.733622 },
  { km: 52.727, lat: 47.607639, lng: -2.744415 },
  { km: 54.480, lat: 47.615494, lng: -2.758963 },
  { km: 56.942, lat: 47.622827, lng: -2.778060 },
  { km: 59.501, lat: 47.617345, lng: -2.756667 },
  { km: 61.831, lat: 47.614553, lng: -2.731326 },
  { km: 65.509, lat: 47.626370, lng: -2.748084 },
  { km: 70.942, lat: 47.652698, lng: -2.758470, label: 'Arrivée — Port de Vannes', finish: true },
];

// Distance totale réelle (depuis le dernier point du parcours GPX)
const TOTAL_KM   = POINTS[POINTS.length - 1].km;
const BASE_PACE  = (11 * 3600) / TOTAL_KM; // sec/km pour 11h

function formatKm(km) {
  return Number.isInteger(km) ? String(km) : km.toFixed(1);
}

// ─── POSITIONS PERSONNALISÉES (localStorage + URL) ───────
// Les positions déplacées à la main sont conservées entre les rafraîchissements.
// v4 : km recalculés depuis le tracé GPX (distance exacte), les overrides
// v3 étaient keyés par les anciens km approximatifs — on les ignore.
const POINTS_STORAGE_KEY = 'reveil-des-ducs:point-positions:v4';

function readOverrides() {
  try {
    const raw = localStorage.getItem(POINTS_STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}
function writeOverrides(overrides) {
  try {
    localStorage.setItem(POINTS_STORAGE_KEY, JSON.stringify(overrides));
  } catch (e) {
    console.warn('Impossible de sauvegarder les positions', e);
  }
}
function applyOverridesToPoints(overrides) {
  POINTS.forEach(p => {
    const o = overrides[p.km];
    if (o && typeof o.lat === 'number' && typeof o.lng === 'number') {
      p.lat = o.lat;
      p.lng = o.lng;
    }
  });
}
function loadPointOverrides() {
  applyOverridesToPoints(readOverrides());
}
function savePointOverride(km, lat, lng) {
  const overrides = readOverrides();
  overrides[km] = { lat, lng };
  writeOverrides(overrides);
}

// Encode/décode compact (base64 URL-safe) pour le partage via lien
function encodeOverrides(overrides) {
  const json = JSON.stringify(overrides);
  return btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function decodeOverrides(str) {
  try {
    const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
    const pad = b64.length % 4 ? '='.repeat(4 - (b64.length % 4)) : '';
    const json = decodeURIComponent(escape(atob(b64 + pad)));
    return JSON.parse(json);
  } catch (e) {
    console.warn('Lien de positions invalide', e);
    return null;
  }
}

// Au chargement : si un hash #pos=... est présent, importe et enregistre
function importOverridesFromHash() {
  const h = window.location.hash || '';
  const m = h.match(/[#&]pos=([^&]+)/);
  if (!m) return false;
  const imported = decodeOverrides(m[1]);
  if (!imported || typeof imported !== 'object') return false;
  const current = readOverrides();
  Object.assign(current, imported);
  writeOverrides(current);
  // Nettoie le hash pour éviter les ré-imports intempestifs
  try {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  } catch (e) {}
  return true;
}

importOverridesFromHash();

// ─── TRACE GPX (parcours réel) ───────────────────────────
const GPX_URL = 'l-ultra-marin-2026-reveil-des-ducs.gpx';
let trace = [];          // [{lat, lng, ele, cumKm}]
let traceTotalKm = 0;

function haversineMeters(a, b) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const la1 = toRad(a.lat), la2 = toRad(b.lat);
  const x = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(x));
}

async function loadGpxTrace() {
  try {
    const res = await fetch(GPX_URL, { cache: 'force-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'application/xml');
    if (doc.getElementsByTagName('parsererror').length) throw new Error('GPX XML invalide');
    const trkpts = doc.getElementsByTagName('trkpt');
    const pts = [];
    let cumM = 0;
    for (let i = 0; i < trkpts.length; i++) {
      const t = trkpts[i];
      const lat = parseFloat(t.getAttribute('lat'));
      const lng = parseFloat(t.getAttribute('lon'));
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;
      const eleEl = t.getElementsByTagName('ele')[0];
      const ele = eleEl ? parseFloat(eleEl.textContent) : null;
      if (pts.length) cumM += haversineMeters(pts[pts.length - 1], { lat, lng });
      pts.push({ lat, lng, ele, cumKm: cumM / 1000 });
    }
    trace = pts;
    traceTotalKm = pts.length ? pts[pts.length - 1].cumKm : 0;
    return true;
  } catch (e) {
    console.warn('Trace GPX non chargée :', e);
    trace = [];
    traceTotalKm = 0;
    return false;
  }
}

// Renvoie la position (lat/lng) sur la trace GPX au kilométrage `km`.
function pointAtKm(km) {
  if (!trace.length) return null;
  if (km <= trace[0].cumKm) return { lat: trace[0].lat, lng: trace[0].lng };
  if (km >= traceTotalKm) return { lat: trace[trace.length - 1].lat, lng: trace[trace.length - 1].lng };
  let lo = 0, hi = trace.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (trace[mid].cumKm < km) lo = mid; else hi = mid;
  }
  const a = trace[lo], b = trace[hi];
  const span = b.cumKm - a.cumKm;
  const t = span > 0 ? (km - a.cumKm) / span : 0;
  return { lat: a.lat + (b.lat - a.lat) * t, lng: a.lng + (b.lng - a.lng) * t };
}

// Repositionne les POINTS par défaut sur la trace réelle à leur km exact.
// Les overrides localStorage seront appliqués ensuite et restent prioritaires.
function snapPointsToTrace() {
  if (!trace.length) return;
  POINTS.forEach(p => {
    const pos = pointAtKm(p.km);
    if (pos) {
      p.lat = pos.lat;
      p.lng = pos.lng;
    }
  });
}

// ─── STATE ───────────────────────────────────────────────
let currentPace = BASE_PACE;
let seenPoints  = {}; // km -> actualSec
let pendingKm   = null;
let leafletMap  = null;
let mapMarkers  = {};
let mapPolyline = null;

// ─── HELPERS ─────────────────────────────────────────────
function secToHHMM(sec) {
  const s = Math.round(sec) % 86400;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  return `${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}`;
}
function timeStrToSec(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 3600 + m * 60;
}
function formatPace(s) {
  const m = Math.floor(s / 60);
  const ss = Math.round(s % 60);
  return `${m}'${String(ss).padStart(2,'0')}"/km`;
}
function estSec(km) {
  let refKm = 0, refSec = DEPART_SEC;
  for (const [k, v] of Object.entries(seenPoints)) {
    const kn = parseFloat(k);
    if (kn <= km && kn > refKm) { refKm = kn; refSec = v; }
  }
  return refSec + (km - refKm) * currentPace;
}

// ─── RECALIBRATION ───────────────────────────────────────
function recalibrate() {
  const seen = Object.entries(seenPoints)
    .map(([k,v]) => [parseFloat(k), v])
    .sort((a,b) => a[0]-b[0]);
  if (!seen.length) { currentPace = BASE_PACE; return; }
  const [lastKm, lastSec] = seen[seen.length - 1];
  currentPace = (lastSec - DEPART_SEC) / lastKm;

  const finishSec = DEPART_SEC + currentPace * TOTAL_KM;
  const banner = document.getElementById('recalib-banner');
  banner.innerHTML = `⚡ Rythme recalibré : <strong>${formatPace(currentPace)}</strong> &mdash; Arrivée estimée : <strong>${secToHHMM(finishSec)}</strong>`;
  banner.classList.add('show');
  document.getElementById('est-arrival').textContent = `~${secToHHMM(finishSec)}`;
  document.getElementById('pace-chip').textContent = formatPace(currentPace);
}

// ─── RENDER LIST ─────────────────────────────────────────
function renderList() {
  const container = document.getElementById('points-list');
  container.innerHTML = '';

  const viewPoints = POINTS.filter(p => !p.start && !p.finish);
  const nextKm = viewPoints.find(p => !seenPoints[p.km])?.km;

  viewPoints.forEach((point, idx) => {
    const prev   = idx > 0 ? viewPoints[idx - 1] : POINTS[0];
    const isSeen = !!seenPoints[point.km];
    const isNext = point.km === nextKm;
    const gapMin = Math.round((point.km - prev.km) * currentPace / 60);
    const isClose = gapMin < 10 && !isSeen;

    const div = document.createElement('div');
    div.className = `point-item${isSeen ? ' is-seen' : ''}${isNext ? ' is-next' : ''}${isClose && !isNext ? ' is-close' : ''}`;
    div.id = `pt-${point.km}`;

    const courtBadge = isClose ? `<span class="badge-court">COURT</span>` : '';
    const actualLine = isSeen
      ? `<div class="point-actual">✓ Vu à ${secToHHMM(seenPoints[point.km])}</div>`
      : '';

    div.innerHTML = `
      <div class="km-badge">km ${formatKm(point.km)}<small>${isNext ? '← PROCHAIN' : ''}</small></div>
      <div class="point-center">
        <div class="point-time">${secToHHMM(estSec(point.km))}</div>
        <div class="point-gap">+${gapMin} min depuis km ${formatKm(prev.km)}${courtBadge}</div>
        ${actualLine}
      </div>
      <button class="btn-vu${isSeen ? ' done' : ''}" onclick="openModal(${point.km})">
        ${isSeen ? '✓ Vu' : '🙋 Vu !'}
      </button>
    `;
    container.appendChild(div);
  });

  // Arrivée
  const finDiv = document.createElement('div');
  finDiv.className = 'finish-row';
  finDiv.innerHTML = `
    <div class="km-badge" style="color:var(--accent2)">🏁<small>ARRIVÉE</small></div>
    <div class="point-center">
      <div class="point-time">${secToHHMM(estSec(70))}</div>
      <div class="point-gap">Port de Vannes</div>
    </div>
  `;
  container.appendChild(finDiv);

  // Next label
  document.getElementById('next-label').textContent =
    nextKm ? `Prochain → km ${nextKm}` : '🎉 Course terminée !';

  // Auto-scroll to next point
  if (nextKm) {
    setTimeout(() => {
      const el = document.getElementById(`pt-${nextKm}`);
      el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

// ─── MODAL ───────────────────────────────────────────────
function openModal(km) {
  pendingKm = km;
  document.getElementById('modal-km-label').textContent = `Passage au km ${formatKm(km)}`;
  const est = estSec(km);
  const h = Math.floor((Math.round(est) % 86400) / 3600);
  const m = Math.floor((Math.round(est) % 3600) / 60);
  document.getElementById('modal-time').value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  pendingKm = null;
}
function confirmVu() {
  if (pendingKm === null) return;
  let sec = timeStrToSec(document.getElementById('modal-time').value);
  if (sec < DEPART_SEC - 3600) sec += 86400; // traversée minuit
  seenPoints[pendingKm] = sec;
  recalibrate();
  closeModal();
  renderList();
  if (leafletMap) updateMapMarkers();
}

// ─── CARTE ───────────────────────────────────────────────
function initMap() {
  if (leafletMap) return;
  leafletMap = L.map('map', { zoomControl: true }).setView([47.570, -2.720], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OSM',
    maxZoom: 18
  }).addTo(leafletMap);

  // Polyligne du parcours : trace GPX réelle si dispo, sinon segments approximatifs
  if (trace.length) {
    const traceLL = trace.map(p => [p.lat, p.lng]);
    mapPolyline = L.polyline(traceLL, { color: '#2a7fff', weight: 3, opacity: 0.8 }).addTo(leafletMap);
  } else {
    const latlngs = POINTS.map(p => [p.lat, p.lng]);
    mapPolyline = L.polyline(latlngs, { color: '#2a7fff', weight: 2.5, opacity: 0.45, dashArray: '6 5' }).addTo(leafletMap);
  }

  POINTS.forEach(point => {
    const m = L.marker([point.lat, point.lng], {
      icon: buildPointIcon(point),
      draggable: true,
      autoPan: true
    }).addTo(leafletMap);

    m.bindPopup(() => buildPointPopup(point), { minWidth: 180 });

    m.on('dragend', () => {
      const ll = m.getLatLng();
      point.lat = ll.lat;
      point.lng = ll.lng;
      savePointOverride(point.km, ll.lat, ll.lng);
      // On ne met plus à jour la polyligne : elle représente le parcours réel
      // (GPX), pas les positions des spectateurs.
      if (!trace.length && mapPolyline) {
        mapPolyline.setLatLngs(POINTS.map(p => [p.lat, p.lng]));
      }
    });

    mapMarkers[point.km] = m;
  });
}

function buildPointPopup(point) {
  const label = point.label || `km ${formatKm(point.km)} · ${secToHHMM(estSec(point.km))}`;
  const lat = point.lat.toFixed(6);
  const lng = point.lng.toFixed(6);
  const svUrl  = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}`;
  const satUrl = `https://www.google.com/maps/@?api=1&map_action=map&basemap=satellite&center=${lat},${lng}&zoom=19`;
  const gmUrl  = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
  return `
    <div class="point-popup">
      <div class="pp-title">${label}</div>
      <div class="pp-coords">${lat}, ${lng}</div>
      <div class="pp-actions">
        <a href="${svUrl}" target="_blank" rel="noopener" class="pp-btn pp-sv">🧭 Street View</a>
        <a href="${satUrl}" target="_blank" rel="noopener" class="pp-btn pp-sat">🛰️ Satellite</a>
        <a href="${gmUrl}" target="_blank" rel="noopener" class="pp-btn pp-gm">📍 Google Maps</a>
      </div>
      <div class="pp-hint">Glisser le marqueur pour repositionner</div>
    </div>
  `;
}

function buildPointIcon(point) {
  const isStart  = !!point.start;
  const isFinish = !!point.finish;
  const isSeen   = !!seenPoints[point.km];
  const color = isStart ? '#f5a623' : isFinish ? '#00d4aa' : isSeen ? '#00d4aa' : '#3a8bff';
  const size = (isStart || isFinish) ? 20 : 14;
  const html = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.25);box-sizing:border-box;"></div>`;
  return L.divIcon({
    html,
    className: 'reveil-point-icon',
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
    popupAnchor: [0, -size / 2]
  });
}

function updateMapMarkers() {
  POINTS.forEach(point => {
    const m = mapMarkers[point.km];
    if (m) m.setIcon(buildPointIcon(point));
  });
}

// ─── OUTILS CARTE : partage / export / reset ────────────
function showToast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), duration);
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) {}
  // Fallback
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

async function copyPositionsLink() {
  const overrides = readOverrides();
  if (!Object.keys(overrides).length) {
    showToast('Aucune position déplacée à partager');
    return;
  }
  const base = window.location.origin + window.location.pathname;
  const url = base + '#pos=' + encodeOverrides(overrides);
  const ok = await copyToClipboard(url);
  showToast(ok ? '🔗 Lien copié — ouvre-le sur l\'autre appareil' : 'Échec de la copie');
}

async function copyPointsSource() {
  // Génère un tableau POINTS prêt à coller dans le code source
  const lines = POINTS.map(p => {
    const parts = [
      `km: ${p.km}`,
      `lat: ${p.lat.toFixed(6)}`,
      `lng: ${p.lng.toFixed(6)}`
    ];
    if (p.label) parts.push(`label: ${JSON.stringify(p.label)}`);
    if (p.start)  parts.push('start: true');
    if (p.finish) parts.push('finish: true');
    return `  { ${parts.join(', ')} },`;
  });
  const src = 'const POINTS = [\n' + lines.join('\n') + '\n];';
  const ok = await copyToClipboard(src);
  showToast(ok ? '📋 Tableau POINTS copié' : 'Échec de la copie');
}

function resetPointPositions() {
  const overrides = readOverrides();
  if (!Object.keys(overrides).length) {
    showToast('Aucune position à réinitialiser');
    return;
  }
  if (!confirm('Réinitialiser toutes les positions déplacées ?')) return;
  localStorage.removeItem(POINTS_STORAGE_KEY);
  window.location.reload();
}

// ─── TABS ────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (name==='list'?0:1)));
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
    el.style.display = 'none';
  });
  const el = document.getElementById(`tab-${name}`);
  el.style.display = 'flex';
  el.classList.add('active');
  if (name === 'map') {
    initMap();
    setTimeout(() => leafletMap?.invalidateSize(), 150);
  }
}

// ─── INIT ────────────────────────────────────────────────
async function bootstrap() {
  await loadGpxTrace();
  // Les positions des POINTS sont désormais figées dans le code source
  // (issues d'un repositionnement manuel sauvegardé via « Export POINTS »).
  // Pas de snap automatique sur le tracé GPX : ça écraserait le travail.
  loadPointOverrides();        // overrides utilisateur prioritaires (drag récent)
  renderList();
}
bootstrap();
</script>
